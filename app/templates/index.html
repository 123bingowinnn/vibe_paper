<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vibe Paper</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" data-i18n="eyebrow">Agent-Native Local Paper Workspace</p>
          <h1>Vibe Paper</h1>
          <p class="project-name">{{ project_name }}</p>
        </div>
        <div class="actions">
          <button id="regenerate-context" data-i18n="button.generateContext">Generate Context</button>
          <button id="save-file" data-i18n="button.saveFile">Save File</button>
          <button id="compile-paper" class="primary" data-i18n="button.compilePaper">Compile Paper</button>
          <button id="refresh-preview" data-i18n="button.refreshPreview">Refresh Preview</button>
          <button id="open-formal-pdf" data-i18n="button.openFormalPdf">Open Formal PDF</button>
          <button id="toggle-language" class="lang-toggle" type="button">ZH</button>
        </div>
      </header>

      <section class="status-strip">
        <div>
          <span class="status-label" data-i18n="status.project">Project</span>
          <span id="project-root-value" class="status-value"></span>
        </div>
        <div>
          <span class="status-label" data-i18n="status.activeFile">Active file</span>
          <span id="active-file-value" class="status-value" data-empty-key="common.none">None</span>
        </div>
        <div>
          <span class="status-label" data-i18n="status.paperStatus">Paper status</span>
          <span id="paper-status-value" class="status-value" data-empty-key="status.waitingForScan">Waiting for project scan</span>
        </div>
      </section>

      <main class="workspace">
        <aside class="panel panel-tree">
          <div class="panel-header">
            <h2 data-i18n="panel.projectFiles">Project Files</h2>
            <button id="reload-tree" data-i18n="button.reload">Reload</button>
          </div>
          <div id="file-tree" class="file-tree"></div>
        </aside>

        <section class="panel panel-editor">
          <div class="panel-header">
            <h2 data-i18n="panel.sourceEditor">Source Editor</h2>
            <span id="editor-status" class="hint" data-empty-key="editor.noFileSelected">No file selected</span>
          </div>
          <textarea id="editor" spellcheck="false"></textarea>
        </section>

        <section class="panel panel-preview">
          <div class="panel-header">
            <h2 data-i18n="panel.pdfPreview">PDF Preview</h2>
            <span id="preview-status" class="hint" data-empty-key="preview.notLoaded">Preview not loaded</span>
          </div>
          <iframe id="pdf-frame" title="Compiled PDF preview"></iframe>
        </section>
      </main>

      <section class="panel panel-log">
        <div class="panel-header">
          <h2 data-i18n="panel.buildLog">Build Log</h2>
          <span id="log-status" class="hint" data-empty-key="log.idle">Idle</span>
        </div>
        <pre id="build-log"></pre>
      </section>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
